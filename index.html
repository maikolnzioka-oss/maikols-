        }

         text-align: center;

<body>

<div class="container" style="display:none;">
    <h1>🎯 Number Guessing Game 🎯</h1><br><br>
    <p>Guess a number betwween 1 and 100</p><br><br>

    <h3>💰Deposit Balance: Ksh <span id="balance">0</span></h3><br><br>

  <input type="number" id="depositAmount" placeholder="Enter deposit of your choice">


    <button onclick="deposit()">Deposit</button>

    <br>

    <input type="number" id="guessInput" placeholder="Enter your guess">
    <button onclick="checkGuess()">Confirm guess</button>

    <p id="message"></p>

    <!-- Withdraw -->
    <button onclick="withdraw()">Withdraw Money Won</button>
</div>

<div id="loadingScreen">
    <h2>🎮 Starting Number Guessing Game...</h2>
    <p id="dots">Loading</p>
</div>

<div id="registerForm" style="display:none;">
    <h2>Register</h2><br><br>
    <input type="text" id="username" placeholder="Enter name"><br><br>
    <input type="email" id="email" placeholder="Enter email"><br><br>
    <p id="regMesssage"></p>
    <button onclick="startGame()">Submit</button>
</div>


<footer>
    <p>Contact us: info@michaelnzioka.com</p>
</footer>

<script>



    let secretNumber = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;
    let balance = 0;
    let canWithdraw = false;

    function updateBalance() {
        document.getElementById("balance").textContent = balance;
    }

    function deposit() {
        let amount = Number(document.getElementById("depositAmount").value);
        if (amount > 0) {
            balance += amount;
            updateBalance();
            alert("Deposit successful!");
        } else {
            alert("Enter a valid amount");
        }
    }

    function checkGuess() {
        let guess = Number(document.getElementById("guessInput").value);
        let message = document.getElementById("message");
        attempts++;

        if (guess < secretNumber) {
            message.textContent = "Too low!";
        } else if (guess > secretNumber) {
            message.textContent = "Too high!";
        } else {
            if (attempts <= 5) {
                let reward = 200;
                balance += reward;
                canWithdraw = true;
                message.textContent = "🎉 You won Ksh " + reward + " in " + attempts + " attempts!";
            } else {
                canWithdraw = false;
                message.textContent = "Correct! But no reward (more than 5 attempts)";
            }

            updateBalance();

        
            secretNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
        }
    }

    function withdraw() {
        if (!canWithdraw) {
            alert("❌ Withdrawal not allowed. You must win within 5 attempts.");
            return;
        }

        if (balance > 0) {
            alert("You withdrew Ksh " + balance);
            balance = 0;
            canWithdraw = false;
            updateBalance();
        } else {
            alert("No money to withdraw");
        }
    }

</script>

<script>
setTimeout(function () {
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
    bgMusic.play();
}, 3000);

function startGame() {
    let name = document.getElementById("username").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("regMessage");

    if (!name ||!email) {
        message.textContent = "❌ Please fill all fields";
        return;
    }

    // Save name
    localStorage.setItem("playerName", name);

    // Switch screens
    document.getElementById("registerForm").style.display = "none";
    document.querySelector(".container").style.display = "block";

    // Change background
    document.body.style.backgroundImage = gameBg;

    // Show welcome message
    document.getElementById("message").textContent = "👋 Welcome " + name + "! Start guessing!";
}

</script>
